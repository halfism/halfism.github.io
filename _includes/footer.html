{% assign t = site.data.locales[page.lang][page.lang] %}
<!-- Footer -->
<footer class="site-footer border-t py-12 transition-colors duration-300">
    <div class="container px-4 md\:px-6">

        <!-- Footer Content -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">

            <!-- Brand -->
            <div class="text-center md:text-left">
                <a href="{% if page.lang == 'en' %}/en/{% else %}/{% endif %}" class="text-xl font-bold flex items-center justify-center md:justify-start gap-2 text-primary">
                    <div class="w-8 h-8 flex items-center justify-center rounded-lg bg-primary text-inverse text-sm">H</div>
                    halfism
                </a>
                <p class="text-secondary mt-2 text-sm max-w-xs">{{ t.footer.bio }}</p>
            </div>

            <!-- Social Links -->
            <div class="flex items-center gap-4">
                {% for social in site.data.socials %}
                <a href="{{ social.url }}" target="_blank" rel="noopener noreferrer"
                   class="social-link {{ social.hover_class }} w-10 h-10 flex items-center justify-center rounded-full bg-tertiary text-muted hover:text-inverse transition-all"
                   title="{{ social.name }}" aria-label="{{ social.name }}">
                    <i class="fa {{ social.icon }} text-lg"></i>
                </a>
                {% endfor %}
            </div>
        </div>

        <!-- Divider -->
        <div class="mt-12 pt-8 border-t flex flex-col md:flex-row justify-between items-center gap-4" style="border-color: var(--color-border-light);">

            <!-- Copyright -->
            <p class="text-muted text-sm">&copy; {{ 'now' | date: "%Y" }} halfism. {{ t.footer.copyright }}.</p>

            <!-- Links -->
            <div class="flex gap-6">
                <a href="#" class="text-muted hover:text-primary text-sm transition-colors">{{ t.footer.privacy }}</a>
                <a href="#" class="text-muted hover:text-primary text-sm transition-colors">{{ t.footer.terms }}</a>

                <!-- Theme Toggle (Mobile only) -->
                <button onclick="toggleTheme()" class="md:hidden text-muted hover:text-primary text-sm">
                    <i id="theme-icon-footer" class="fa fa-moon-o"></i>
                </button>
            </div>
        </div>
    </div>
</footer>

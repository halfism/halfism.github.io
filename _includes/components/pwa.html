<!-- PWA Install Prompt Component -->
<div id="pwa-install-prompt" class="pwa-banner" style="display: none;">
    <div class="pwa-banner__content">
        <div class="pwa-banner__icon">📱</div>
        <div class="pwa-banner__text">
            <strong>安装应用到主屏幕</strong>
            <p>获取更快的访问体验，支持离线使用</p>
        </div>
        <div class="pwa-banner__actions">
            <button onclick="installPWA()" class="btn btn--primary btn--sm" id="install-btn">
                安装
            </button>
            <button onclick="dismissInstallPrompt()" class="btn btn--ghost btn--sm">
                稍后
            </button>
        </div>
    </div>
</div>

<!-- PWA Update Available Notification -->
<div id="pwa-update-notification" class="pwa-update" style="display: none;">
    <div class="pwa-update__content">
        <span class="pwa-update__icon">🔄</span>
        <span class="pwa-update__text">发现新版本可用！</span>
        <button onclick="updatePWA()" class="btn btn--primary btn--sm">
            更新
        </button>
        <button onclick="dismissUpdateNotification()" class="pwa-update__close">×</button>
    </div>
</div>

<style>

    /* PWA Update Notification */
    .pwa-update {
        position: fixed;

        padding: 16px 20px;

        box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
        z-index: 9997;

        max-width: 360px;

        to { transform: translateX(0); opacity: 1; }

</style>

<script>
/**
 * PWA Installation and Update Manager
 */
class PWAManager {
    constructor() {
        this.deferredPrompt = null;
        this.isInstalled = false;

        this.init();
    }

    async init() {
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            try {
                const registration = await navigator.serviceWorker.register('/sw.js');
                console.log('[PWA] SW registered:', registration.scope);

                // Check for updates
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'activated') {
                            this.showUpdateNotification();
                        }
                    });
                });
            } catch (error) {
                console.error('[PWA] SW registration failed:', error);
            }
        }

        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            this.deferredPrompt = e;

            // Show install banner after delay (don't annoy user immediately)
            setTimeout(() => {
                if (!this.getDismissedStatus()) {
                    this.showInstallBanner();
                }
            }, 5000);
        });

        // Track successful installation
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed successfully');
            this.isInstalled = true;
            this.hideInstallBanner();

            // Track installation event (if analytics available)
            if (window.gtag) {
                gtag('event', 'pwa_installed', {
                    'event_category': 'PWA',
                    'event_label': 'App Installed'
                });
            }
        });
    }

    // Show install banner
    showInstallBanner() {
        const banner = document.getElementById('pwa-install-prompt');
        if (banner && this.deferredPrompt) {
            banner.style.display = 'block';
        }
    }

    // Hide install banner
    hideInstallBanner() {
        const banner = document.getElementById('pwa-install-prompt');
        if (banner) {
            banner.style.display = 'none';
        }
    }

    // Dismiss install prompt temporarily
    dismissInstallPrompt() {
        this.hideInstallBanner();
        this.setDismissedStatus(24 * 60 * 60 * 1000); // Dismiss for 24 hours

        // Track dismissal
        if (window.gtag) {
            gtag('event', 'pwa_install_dismissed', {
                'event_category': 'PWA',
                'event_label': 'Install Prompt Dismissed'
            });
        }
    }

    // Trigger PWA installation
    async installPWA() {
        if (!this.deferredPrompt) return;

        try {
            // Show the browser's install prompt
            const result = await this.deferredPrompt.prompt();

            // Wait for user response
            const { outcome } = result;

            if (outcome === 'accepted') {
                console.log('[PWA] User accepted install prompt');

                // Track acceptance
                if (window.gtag) {
                    gtag('event', 'pwa_install_accepted', {
                        'event_category': 'PWA',
                        'event_label': 'Install Prompt Accepted'
                    });
                }
            } else {
                console.log('[PWA] User dismissed install prompt');

                if (window.gtag) {
                    gtag('event', 'pwa_install_rejected', {
                        'event_category': 'PWA',
                        'event_label': 'Install Prompt Rejected'
                    });
                }
            }

            // Clear deferred prompt
            this.deferredPrompt = null;
            this.hideInstallBanner();

        } catch (error) {
            console.error('[PWA] Install failed:', error);
        }
    }

    // Show update notification
    showUpdateNotification() {
        const notification = document.getElementById('pwa-update-notification');
        if (notification) {
            notification.style.display = 'block';

            // Auto-hide after 10 seconds
            setTimeout(() => {
                this.dismissUpdateNotification();
            }, 10000);
        }
    }

    // Dismiss update notification
    dismissUpdateNotification() {
        const notification = document.getElementById('pwa-update-notification');
        if (notification) {
            notification.style.display = 'none';
        }
    }

    // Trigger PWA update
    async updatePWA() {
        // Send message to service worker to skip waiting
        if ('serviceWorker' in navigator) {
            const registration = await navigator.serviceWorker.ready;
            if (registration.waiting || registration.active) {
                // Force reload to activate new service worker
                window.location.reload(true);
            }
        }
    }

    // Check if app is already installed
    checkInstalled() {
        return window.matchMedia('(display-mode: standalone)').matches ||
               navigator.standalone === true;
    }

    // Local storage helpers for dismissal status
    getDismissedStatus() {
        const dismissedUntil = localStorage.getItem('pwa_install_dismissed_until');
        if (!dismissedUntil) return false;
        return Date.now() < parseInt(dismissedUntil);
    }

    setDismissedStatus(durationMs) {
        const until = Date.now() + durationMs;
        localStorage.setItem('pwa_install_dismissed_until', until.toString());
    }
}

// Initialize PWA manager
const pwaManager = new PWAManager();

// Expose functions for global access
window.installPWA = () => pwaManager.installPWA();
window.dismissInstallPrompt = () => pwaManager.dismissInstallPrompt();
window.updatePWA = () => pwaManager.updatePWA();
window.dismissUpdateNotification = () => pwaManager.dismissUpdateNotification();

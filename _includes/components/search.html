{% assign t = site.data.locales[page.lang][page.lang] %}
<!-- Search Modal -->
<div id="search-modal" class="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-title">
    <div class="search-modal__overlay" onclick="closeSearchModal()"></div>

    <div class="search-modal__container">
        <div class="search-modal__header">
            <h2 id="search-title">
                <i class="fa fa-search"></i>
                {{ t.search.title }}
            </h2>
            <button onclick="closeSearchModal()" class="search-modal__close" aria-label="{{ t.search.close }}">
                <i class="fa fa-times"></i>
            </button>
        </div>

        <div class="search-modal__input-wrapper">
            <i class="fa fa-search search-modal__icon"></i>
            <input
                type="text"
                id="search-input"
                class="search-modal__input"
                placeholder="{{ t.search.placeholder }}"
                autocomplete="off"
                autofocus
            >
            <kbd class="search-modal__shortcut">ESC</kbd>
        </div>

        <div id="search-results" class="search-results">
            <div class="search-results__empty">
                <i class="fa fa-file-text-o"></i>
                <p>{{ t.search.empty }}</p>
            </div>
        </div>

        <div class="search-modal__footer">
            <div class="search-tips">
                <span><kbd>↑↓</kbd> {{ t.search.navigate }}</span>
                <span><kbd>↵</kbd> {{ t.search.open }}</span>
                <span><kbd>ESC</kbd> {{ t.search.close }}</span>
            </div>
        </div>
    </div>
</div>

<style>
    .search-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        align-items: flex-start;
        justify-content: center;
        padding-top: 15vh;
    }

    .search-modal.active {
        display: flex;
    }

    .search-modal__overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
    }

    .search-modal__container {
        position: relative;
        width: 90%;
        max-width: 640px;
        max-height: 70vh;
        background: var(--color-bg-card);
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        animation: slideDown 0.3s ease-out;
        border: 1px solid var(--color-border);
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .search-modal__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px 12px;
        border-bottom: 1px solid var(--color-border-light);
    }

    .search-modal__header h2 {
        font-size: 16px;
        font-weight: 600;
        color: var(--color-text-secondary);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .search-modal__close {
        width: 32px;
        height: 32px;
        border: none;
        background: var(--color-bg-tertiary);
        border-radius: 8px;
        cursor: pointer;
        color: var(--color-text-muted);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .search-modal__close:hover {
        background: var(--color-primary);
        color: white;
    }

    .search-modal__input-wrapper {
        position: relative;
        padding: 12px 24px;
    }

    .search-modal__icon {
        position: absolute;
        left: 40px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-text-muted);
        font-size: 18px;
    }

    .search-modal__input {
        width: 100%;
        padding: 14px 50px 14px 48px;
        border: 2px solid var(--color-border);
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        transition: all 0.2s;
        background: transparent;
        color: var(--color-text);
    }

    .search-modal__input:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .search-modal__shortcut {
        position: absolute;
        right: 36px;
        top: 50%;
        transform: translateY(-50%);
        padding: 4px 10px;
        background: var(--color-bg-tertiary);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        font-size: 11px;
        font-family: monospace;
        color: var(--color-text-muted);
    }

    .search-results {
        max-height: 400px;
        overflow-y: auto;
        padding: 0 12px 12px;
    }

    .search-results::-webkit-scrollbar { width: 8px; }
    .search-results::-webkit-scrollbar-track { background: var(--color-bg-tertiary); border-radius: 4px; }
    .search-results::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

    .search-results__empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-text-muted);
    }

    .search-results__empty i {
        font-size: 48px;
        opacity: 0.3;
        margin-bottom: 16px;
        display: block;
    }

    .search-result-item {
        padding: 16px;
        margin-bottom: 8px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
    }

    .search-result-item:hover,
    .search-result-item.active {
        background: var(--color-bg-secondary);
        border-color: var(--color-border);
    }

    .search-result-item__title { font-size: 16px; font-weight: 600; color: var(--color-text); margin-bottom: 6px; line-height: 1.4; }
    .search-result-item__meta { display: flex; gap: 12px; font-size: 13px; color: var(--color-text-muted); margin-bottom: 8px; }
    .search-result-item__category { background: var(--color-primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }

    .search-result-item__excerpt {
        font-size: 14px;
        color: var(--color-text-secondary);
        line-height: 1.5;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
    }

    .search-result-item mark { background: #fef08a; color: inherit; padding: 0 2px; border-radius: 2px; }

    .search-modal__footer {
        padding: 12px 24px;
        border-top: 1px solid var(--color-border-light);
        background: var(--color-bg-secondary);
    }

    .search-tips { display: flex; gap: 20px; font-size: 13px; color: var(--color-text-muted); }
    .search-tips kbd { padding: 2px 6px; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 4px; font-family: monospace; font-size: 11px; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05); }

    .search-no-results { text-align: center; padding: 40px 20px; color: var(--color-text-muted); }
    .search-no-results i { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.5; }

    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
let searchData = [];
let selectedIndex = -1;
const SEARCH_I18N = {
    noResults: "{{ t.search.no_results }}",
    tryDifferent: "{{ t.search.try_different }}"
};

function initSearch() {
    fetch('/search.json')
        .then(response => response.json())
        .then(data => { searchData = data; })
        .catch(error => console.error('Error loading search data:', error));

    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            openSearchModal();
        }
        if (e.key === 'Escape') closeSearchModal();
        if (document.getElementById('search-modal').classList.contains('active')) {
            const results = document.querySelectorAll('.search-result-item');
            if (e.key === 'ArrowDown') { e.preventDefault(); selectedIndex = Math.min(selectedIndex + 1, results.length - 1); updateSelectedResult(results); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIndex = Math.max(selectedIndex - 1, -1); updateSelectedResult(results); }
            else if (e.key === 'Enter' && selectedIndex >= 0) { e.preventDefault(); results[selectedIndex].click(); }
        }
    });

    const searchInput = document.getElementById('search-input');
    let debounceTimer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => performSearch(e.target.value), 200);
    });
}

function openSearchModal() {
    document.getElementById('search-modal').classList.add('active');
    document.body.style.overflow = 'hidden';
    document.getElementById('search-input').focus();
    selectedIndex = -1;
}

function closeSearchModal() {
    document.getElementById('search-modal').classList.remove('active');
    document.body.style.overflow = '';
    document.getElementById('search-input').value = '';
    resetResults();
}

function performSearch(query) {
    const container = document.getElementById('search-results');
    if (!query.trim()) { resetResults(); return; }
    const nq = query.toLowerCase().trim();
    const results = searchData.map(item => {
        let score = 0;
        if (item.title.toLowerCase().includes(nq)) score += 10;
        if (item.tags.some(t => t.toLowerCase().includes(nq))) score += 5;
        if (item.excerpt.toLowerCase().includes(nq)) score += 3;
        if (item.content.toLowerCase().includes(nq)) score += 1;
        return { ...item, score };
    }).filter(item => item.score > 0).sort((a, b) => b.score - a.score).slice(0, 10);

    if (results.length === 0) {
        container.innerHTML = '<div class="search-no-results"><i class="fa fa-search-minus"></i><p>' + SEARCH_I18N.noResults + ' "' + escapeHtml(query) + '"</p><p style="font-size:13px;margin-top:8px;">' + SEARCH_I18N.tryDifferent + '</p></div>';
        return;
    }
    container.innerHTML = results.map((item, i) => '<div class="search-result-item" onclick="window.location.href=\'' + item.url + '\'" data-index="' + i + '"><div class="search-result-item__title">' + highlightText(item.title, query) + '</div><div class="search-result-item__meta"><span>' + item.date + '</span><span class="search-result-item__category">' + item.category + '</span></div><div class="search-result-item__excerpt">' + highlightText(item.excerpt, query) + '</div></div>').join('');
    selectedIndex = -1;
}

function highlightText(text, query) {
    if (!query) return escapeHtml(text);
    return escapeHtml(text).replace(new RegExp('(' + escapeRegex(query) + ')', 'gi'), '<mark>$1</mark>');
}

function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function updateSelectedResult(results) {
    results.forEach((r, i) => r.classList.toggle('active', i === selectedIndex));
    if (selectedIndex >= 0 && results[selectedIndex]) results[selectedIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function resetResults() {
    document.getElementById('search-results').innerHTML = '<div class="search-results__empty"><i class="fa fa-file-text-o"></i><p>{{ t.search.empty }}</p></div>';
    selectedIndex = -1;
}

document.addEventListener('DOMContentLoaded', initSearch);
</script>

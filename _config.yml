title: halfism | Personal Portfolio
email: contact@halfism.dev
description: >-
  A passionate developer focused on creating meaningful and efficient solutions through code.
baseurl: ""
url: "https://halfism.github.io"

# Author Information
author:
  name: halfism
  avatar: /assets/img/avatar.png
  bio_zh: 一位热爱通过代码创造有意义且高效解决方案的开发者
  bio_en: A passionate developer creating meaningful solutions through code
  location: China
  employer: Freelancer
  tagline_zh: 全栈开发者 · 开源贡献者 · 终身学习者
  tagline_en: Full-Stack Developer · Open Source Contributor · Lifelong Learner

# Social Links
socials:
  github:
    username: halfism
    url: https://github.com/halfism
    icon: fa-github
  twitter:
    username: halfism_dev
    url: https://twitter.com/halfism_dev
    icon: fa-twitter
  linkedin:
    username: halfism
    url: https://linkedin.com/in/halfism
    icon: fa-linkedin
  email:
    url: mailto:contact@halfism.dev
    icon: fa-envelope

# Theme Configuration
theme_settings:
  default_mode: auto  # light, dark, or auto (follows system)
  primary_color: "#3b82f6"  # Blue-500
  accent_color: "#06b6d4"   # Cyan-500
  font_family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif
  code_font_family: 'Fira Code', 'Consolas', Monaco, monospace

# SEO Settings
seo:
  og_image: /assets/img/og-image.png
  twitter_card: summary_large_image
  keywords:
    - developer
    - portfolio
    - full-stack
    - open source
    - web development

# Localization settings
languages: ["en", "zh"]
default_lang: "zh"

# Analytics Settings
google_analytics:
  enabled: true
  tracking_id: "G-XXXXXXXXXX"  # Replace with your Google Analytics 4 Measurement ID

# Comments System (Giscus)
comments:
  enabled: true
  provider: giscus  # Options: giscus, disqus, utterances
  giscus:
    repo: halfism/halfism.github.io
    repo_id: ""  # Get from https://giscus.app
    category: Announcements
    category_id: ""  # Get from https://giscus.app
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: top
    theme: light
    lang: zh-CN
    loading: lazy

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - static/
  - .gitignore

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta name="author" content="{{ site.github_username }}">
    <meta name="robots" content="index, follow">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            light: '#165DFF',
                            DEFAULT: '#165DFF'
                        },
                        secondary: {
                            light: '#36CFC9',
                            DEFAULT: '#36CFC9'
                        },
                        dark: {
                            bg: '#0d1117',
                            card: '#161b22',
                            secondary: '#21262d',
                            border: '#30363d'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Theme Initialization - Critical for preventing flash -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (!theme) {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="font-inter antialiased bg-white dark:bg-dark-bg text-gray-900 dark:text-gray-100 transition-colors duration-300">
    
    <!-- Reading Progress Bar -->
    <div id="reading-progress" aria-hidden="true"></div>
    
    <!-- Main Content -->
    {{ content }}
    
    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top-btn opacity-0 pointer-events-none" aria-label="Back to top">
        <i class="fa fa-arrow-up"></i>
    </button>

    <!-- JavaScript -->
    <script src="/assets/js/main.js"></script>
    
    <!-- Inline Scripts -->
    <script>
        // ============================================
        // Theme Management
        // ============================================
        function toggleTheme() {
            var html = document.documentElement;
            var isDark = html.classList.toggle('dark');
            var theme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            updateThemeIcon(theme);
            updateSwitchState(isDark);
        }

        function updateThemeIcon(theme) {
            var mobileIcon = document.getElementById('theme-icon-mobile');
            var footerIcon = document.getElementById('theme-icon-footer');
            var switchIcon = document.getElementById('theme-switch-icon');
            
            if (mobileIcon) mobileIcon.className = theme === 'dark' ? 'fa fa-sun-o' : 'fa fa-moon-o';
            if (footerIcon) footerIcon.className = theme === 'dark' ? 'fa fa-sun-o' : 'fa fa-moon-o';
            if (switchIcon) switchIcon.className = theme === 'dark' ? 'fa fa-moon-o text-gray-300' : 'fa fa-sun-o text-yellow-500';
        }

        function updateSwitchState(isDark) {
            var knob = document.getElementById('theme-switch-knob');
            if (knob) {
                if (isDark) {
                    knob.classList.remove('translate-x-1');
                    knob.classList.add('translate-x-6');
                } else {
                    knob.classList.add('translate-x-1');
                    knob.classList.remove('translate-x-6');
                }
            }
        }

        // ============================================
        // Back to Top Button
        // ============================================
        function initBackToTop() {
            var btn = document.getElementById('back-to-top');
            if (!btn) return;
            
            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    btn.classList.remove('opacity-0', 'pointer-events-none');
                    btn.classList.add('opacity-100', 'pointer-events-auto');
                } else {
                    btn.classList.add('opacity-0', 'pointer-events-none');
                    btn.classList.remove('opacity-100', 'pointer-events-auto');
                }
            });
            
            btn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ============================================
        // Reading Progress Bar
        // ============================================
        function initProgressBar() {
            var progressBar = document.getElementById('reading-progress');
            if (!progressBar) return;
            
            window.addEventListener('scroll', function() {
                var scrollTop = window.scrollY;
                var docHeight = document.documentElement.scrollHeight - window.innerHeight;
                var progress = (scrollTop / docHeight) * 100;
                progressBar.style.width = progress + '%';
            });
        }

        // ============================================
        // Scroll Animations
        // ============================================
        function initScrollAnimations() {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.animate-on-scroll').forEach(function(el) {
                observer.observe(el);
            });
        }

        // ============================================
        // Mobile Menu
        // ============================================
        function initMobileMenu() {
            var menuToggle = document.getElementById('menu-toggle');
            var mobileMenu = document.getElementById('mobile-menu');
            
            if (menuToggle && mobileMenu) {
                menuToggle.addEventListener('click', function() {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        }

        // ============================================
        // Initialize All
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            var isDark = document.documentElement.classList.contains('dark');
            updateThemeIcon(isDark ? 'dark' : 'light');
            updateSwitchState(isDark);
            initBackToTop();
            initProgressBar();
            initScrollAnimations();
            initMobileMenu();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="{{ page.lang | default: site.default_lang }}" {% if site.theme_settings.default_mode == 'auto' %}{% else %}data-theme="{{ site.theme_settings.default_mode }}"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta name="author" content="{{ site.author.name }}">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="{{ site.theme_settings.primary_color }}">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:image" content="{% if site.seo.og_image %}{{ site.url }}{{ site.seo.og_image }}{% else %}{{ site.url }}/assets/img/og-image.png{% endif %}">
    <meta property="og:locale" content="{% if page.lang == 'en' %}en_US{% else %}zh_CN{% endif %}">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="{% if site.seo.twitter_card %}{{ site.seo.twitter_card }}{% else %}summary_large_image{% endif %}">
    <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{% if site.seo.og_image %}{{ site.url }}{{ site.seo.og_image }}{% else %}{{ site.url }}/assets/img/og-image.png{% endif %}">
    {% if site.socials.twitter.username %}
    <meta name="twitter:creator" content="@{{ site.socials.twitter.username }}">
    {% endif %}
    
    <!-- Keywords for SEO -->
    {% if site.seo.keywords %}
    <meta name="keywords" content="{{ site.seo.keywords | join: ', ' }}">
    {% endif %}
    
    <!-- Preconnect to external resources (Performance) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <!-- Font Awesome Icons (Lightweight) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" 
          integrity="sha384-wvfqpsqmzxlXPIOa4MzN7ZmY5W6QXrb1fV+KvZl/OkvqL0hO6eN2Z3VxZMqI3QJ" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- Theme Initialization - Critical for preventing FOUC (Flash of Unstyled Content) -->
    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme');
            var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
            
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <!-- Custom Styles (Loaded early to prevent layout shift) -->
    <link rel="stylesheet" href="/assets/css/style.css">

    {% if site.google_analytics.enabled and site.google_analytics.tracking_id %}
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics.tracking_id }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics.tracking_id }}', {
            page_path: '{{ page.url }}',
            anonymize_ip: true
        });
    </script>
    {% endif %}
</head>
<body style="font-family: {{ site.theme_settings.font_family }};">
    
    <!-- Skip to main content (Accessibility) -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[9999] focus:px-4 focus:py-2 focus:bg-primary focus:text-white focus:rounded-lg">
        Skip to main content
    </a>
    
    <!-- Reading Progress Bar -->
    <div id="reading-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-hidden="true"></div>
    
    <!-- Main Content -->
    <main id="main-content">
        {{ content }}
    </main>
    
    <!-- Back to Top Button (Accessibility enhanced) -->
    <button id="back-to-top" 
            class="fixed bottom-8 right-8 p-3 rounded-full bg-primary text-white shadow-lg opacity-0 invisible transition-all duration-300 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 z-50" 
            aria-label="Back to top"
            style="display: none;">
        <i class="fa fa-arrow-up"></i>
    </button>

    <!-- JavaScript (Deferred for performance) -->
    <script src="/assets/js/main.js" defer></script>

    <!-- Search Modal Component -->
    {% include components/search.html %}
</body>
</html>

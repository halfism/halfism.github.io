<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        dark: '#1D2939',
                        light: '#F9FAFB',
                        accent: '#722ED1'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Critical: Initialize theme BEFORE page renders to prevent flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const theme = savedTheme || systemTheme;
            
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
        }
    </style>
</head>
<body class="font-inter antialiased bg-white dark:bg-[#0d1117] text-gray-900 dark:text-gray-100 transition-colors duration-300">
    {{ content }}

    <script>
        // Theme Toggle - initialization already done in head
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            const theme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const themeIconMobile = document.getElementById('theme-icon-mobile');
            const themeIconFooter = document.getElementById('theme-icon-footer');
            const themeSwitchKnob = document.getElementById('theme-switch-knob');
            const themeSwitchIcon = document.getElementById('theme-switch-icon');
            
            if (themeIconMobile) {
                themeIconMobile.className = theme === 'light' ? 'fa fa-moon-o' : 'fa fa-sun-o';
            }
            
            if (themeIconFooter) {
                themeIconFooter.className = theme === 'light' ? 'fa fa-moon-o' : 'fa fa-sun-o';
            }

            // Update Switch UI
            if (themeSwitchKnob) {
                if (theme === 'dark') {
                    themeSwitchKnob.classList.remove('translate-x-1');
                    themeSwitchKnob.classList.add('translate-x-6');
                } else {
                    themeSwitchKnob.classList.add('translate-x-1');
                    themeSwitchKnob.classList.remove('translate-x-6');
                }
            }

            if (themeSwitchIcon) {
                themeSwitchIcon.className = theme === 'light' ? 'fa fa-sun-o text-yellow-500' : 'fa fa-moon-o text-gray-300';
            }
        }

        // Initialize icons on page load
        document.addEventListener('DOMContentLoaded', function() {
            const isDark = document.documentElement.classList.contains('dark');
            updateThemeIcon(isDark ? 'dark' : 'light');
        });

        // Mobile Menu Toggle
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');

        if (menuToggle && mobileMenu) {
            menuToggle.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // Smooth Scrolling for Anchor Links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();

                const targetId = this.getAttribute('href');
                if (targetId === '#') return;

                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 80,
                        behavior: 'smooth'
                    });

                    // Close mobile menu if open
                    if (mobileMenu && !mobileMenu.classList.contains('hidden')) {
                        mobileMenu.classList.add('hidden');
                    }
                }
            });
        });
    </script>
</body>
</html>

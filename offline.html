<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线 - halfism</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .offline-icon { font-size: 80px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        h1 { font-size: 2rem; margin-bottom: 16px; font-weight: 700; }
        p { font-size: 1.125rem; opacity: 0.9; line-height: 1.6; margin-bottom: 32px; }
        .retry-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 14px 32px; background: white; color: #667eea;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
        }
        .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        .tips { margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.2); font-size: 0.9rem; opacity: 0.8; }
        .tips ul { list-style: none; text-align: left; max-width: 300px; margin: 12px auto 0; }
        .tips li { padding: 6px 0; padding-left: 24px; position: relative; }
        .tips li::before { content: '\2022'; position: absolute; left: 8px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon" aria-hidden="true">&#x1F4E1;</div>
        <h1 id="offline-title">您当前处于离线状态</h1>
        <p id="offline-desc">看起来您的网络连接已断开。请检查网络连接后重试。</p>
        <button onclick="window.location.reload()" class="retry-btn" aria-label="Reload page">
            &#x1F504; <span id="offline-reload">重新加载</span>
        </button>
        <div class="tips">
            <p><strong id="offline-tips">提示：</strong></p>
            <ul>
                <li id="offline-tip1">检查 Wi-Fi 或移动数据是否开启</li>
                <li id="offline-tip2">尝试切换网络或刷新页面</li>
                <li id="offline-tip3">部分内容可能已缓存可供浏览</li>
            </ul>
        </div>
    </div>
    <script>
        var lang = navigator.language || 'zh';
        if (lang.startsWith('en')) {
            document.getElementById('offline-title').textContent = 'You are currently offline';
            document.getElementById('offline-desc').textContent = 'It seems your network connection has been lost. Please check your connection and try again.';
            document.getElementById('offline-reload').textContent = 'Reload';
            document.getElementById('offline-tips').textContent = 'Tips:';
            document.getElementById('offline-tip1').textContent = 'Check if Wi-Fi or mobile data is enabled';
            document.getElementById('offline-tip2').textContent = 'Try switching networks or refreshing the page';
            document.getElementById('offline-tip3').textContent = 'Some content may be cached for browsing';
        }
        window.addEventListener('online', function() { window.location.reload(); });
    </script>
</body>
</html>
